name: Validate skills

on:
  push:
    branches: [main]
  pull_request:

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install skills-ref
        run: pip install skills-ref

      - name: Validate all skills
        run: |
          for skill in skills/*/; do
            agentskills validate "$skill"
          done

      - name: Check SKILL.md line counts
        run: |
          fail=0
          for f in skills/*/SKILL.md; do
            lines=$(wc -l < "$f")
            if [ "$lines" -gt 500 ]; then
              echo "::error file=$f::$f has $lines lines (max 500)"
              fail=1
            fi
          done
          exit $fail

  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check cited doc links against live docs
        run: node scripts/check-doc-links.mjs
